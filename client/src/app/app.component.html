<ion-app>
  <ion-header>
    <ion-toolbar>
      <ion-title>Timeflow</ion-title>

          <ion-button (click)="onLogout()">Logout</ion-button>
        </ion-buttons>
      }
    </ion-toolbar>
  </ion-header>
  <ion-router-outlet />
</ion-app>
