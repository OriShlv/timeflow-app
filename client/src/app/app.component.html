<ion-app>
  @if (auth.isLoggedIn()) {
    <ion-menu contentId="main-content" type="overlay">
      <ion-header>
        <ion-toolbar>
          <ion-title>Menu</ion-title>
        </ion-toolbar>
      </ion-header>
      <ion-content>
        <ion-list lines="none">
          <ion-item button [routerLink]="['/dashboard']" routerLinkActive="selected">
            <ion-icon name="stats-chart-outline" slot="start" />
            <ion-label>Dashboard</ion-label>
          </ion-item>
          <ion-item button [routerLink]="['/tasks']" routerLinkActive="selected">
            <ion-icon name="list-outline" slot="start" />
            <ion-label>Tasks</ion-label>
          </ion-item>
        </ion-list>
      </ion-content>
    </ion-menu>
  }
  <div id="main-content">
    @if (auth.isLoggedIn()) {
      <header class="app-header">
        <div class="app-toolbar">
          <ion-menu-toggle>
            <button type="button" class="menu-btn" aria-label="Open menu">
              <span class="menu-btn-icon">≡</span>
            </button>
          </ion-menu-toggle>
          <h1 class="app-title">Timeflow</h1>
          <button type="button" class="logout-btn" (click)="onLogout()">Logout</button>
        </div>
      </header>
    }
    <div class="page-wrap">
      <ion-router-outlet />
    </div>
  </div>
</ion-app>
